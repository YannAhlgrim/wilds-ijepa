meta:
  seed: 0
  model_name: vit_huge
  embed_dim: 1280
  num_classes: 182
  patch_size: 14
  crop_size: 224
  use_bfloat16: true
  representation_type: last_avgpool
  head_type: linear
  checkpoint_folder: experiment_logs/supervised/
  read_checkpoint: linear_probe-best.pth.tar

data:
  batch_size: 128
  root_path: ./wilds_data
  num_workers: 10
  pin_mem: true
  split: test
  download: true

optimization:
  lr: 0.01
  weight_decay: 5.0e-4
  optimizer: adamw
  epochs: 300
  freeze_weights: true
  lr_schedule: cosine
  warmup: 0
  momentum: 0.99
  start_lr: 0.0
  final_lr: 0.0

logging:
  write_tag: iwildcam_test
  auto_folder: true
